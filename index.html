<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hostel Booking</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f4f4;
    }

    header {
      background: #2c3e50;
      color: white;
      padding: 15px;
      text-align: center;
    }

    nav {
      background: #34495e;
      text-align: center;
      padding: 10px;
    }

    nav a {
      color: white;
      margin: 0 10px;
      text-decoration: none;
    }

    .hero {
      background: url('https://images.unsplash.com/photo-1501117716987-c8e1ecb2108b') no-repeat center/cover;
      height: 300px;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      font-size: 2em;
    }

    .container {
      padding: 20px;
    }

    .rooms {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .room {
      background: white;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      transition: transform 0.3s;
    }

    .room:hover {
      transform: scale(1.05);
    }

    .room img {
      width: 100%;
      border-radius: 10px;
    }

    button {
      background: #27ae60;
      color: white;
      border: none;
      padding: 10px;
      margin-top: 10px;
      width: 100%;
      cursor: pointer;
      border-radius: 5px;
    }

    .form-popup {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: white;
      padding: 20px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
      border-radius: 10px;
      z-index: 1000;
    }

    .overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 999;
    }

    footer {
      background: #2c3e50;
      color: white;
      text-align: center;
      padding: 10px;
      margin-top: 20px;
    }
  </style>
</head>
<body>

<header>
  <h1>Comfort Zone Hotel</h1>
  <p>Comfortable & Affordable Stay</p>
</header>

<nav>
  <a href="#">Home</a>
  <a href="#rooms">Rooms</a>
  <a href="#contact">Contact</a>
</nav>

<div class="hero">Welcome to Our Hotel</div>

<div class="container" id="rooms">
  <h2>Available Rooms</h2>
  <div class="rooms">

    <div class="room">
      <img src="https://images.unsplash.com/photo-1560448204-e02f11c3d0e2">
      <h3>Single Room</h3>
      <p>$10 per night</p>
      <button onclick="openForm('Single Room')">Book Now</button>
    </div>

    <div class="room">
      <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSVudFADQGz_qJdgeKLroav-GON2xHNq6hbJA&s">
      <h3>Double Room</h3>
      <p>$18 per night</p>
      <button onclick="openForm('Double Room')">Book Now</button>
    </div>

    <div class="room">
      <img src="https://images.unsplash.com/photo-1582719478250-c89cae4dc85b">
      <h3>Dormitory</h3>
      <p>$5 per night</p>
      <button onclick="openForm('Dormitory')">Book Now</button>
    </div>

  </div>
</div>

<div class="overlay" id="overlay"></div>

<div class="form-popup" id="bookingForm">
  <h3>Book Room</h3>
  <input type="text" id="name" placeholder="Your Name" required><br><br>
  <input type="date" id="date" required><br><br>
  <input type="hidden" id="roomType">
  <button onclick="submitBooking()">Confirm</button>
  <button onclick="closeForm()" style="background:red; margin-top:5px;">Cancel</button>
</div>

<div class="container" id="contact">
  <h2>Contact Us</h2>
  <p>Email: hotel@example.com</p>
</div>

<footer>
  <p>© 2026 Comfort Zone Hotel</p>
</footer>

<script>
  function openForm(room) {
    document.getElementById('bookingForm').style.display = 'block';
    document.getElementById('overlay').style.display = 'block';
    document.getElementById('roomType').value = room;
  }

  function closeForm() {
    document.getElementById('bookingForm').style.display = 'none';
    document.getElementById('overlay').style.display = 'none';
  }

  function submitBooking() {
    const name = document.getElementById('name').value;
    const date = document.getElementById('date').value;
    const room = document.getElementById('roomType').value;

    if(name === '' || date === '') {
      alert('Please fill all fields');
      return;
    }

    alert(`Booking Confirmed!\nName: ${name}\nRoom: ${room}\nDate: ${date}`);
    closeForm();
  }
</script>

</body>
</html>
